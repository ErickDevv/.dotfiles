add_newline = false
scan_timeout = 10000

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$rust\
$golang\
$java\
$python\
$docker_context\
$character
"""

[directory]
style = "bold cyan"

[git_branch]
symbol = "пҗҳ "
style = "bold purple"

[nodejs]
symbol = "оңҳ "

[python]
symbol = "оҳҶ "

[java]
symbol = "оү– "

[rust]
symbol = "уұҳ— "

[golang]
symbol = "оҳ§ "

[docker_context]
symbol = "пҢҲ "

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вһң](bold red)"
