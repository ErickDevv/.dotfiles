backend = "glx";
vsync = true;
unredir-if-possible = false;

corner-radius = 12;
round-borders = 1;
rounded-corners-exclude = [
    "class_g = 'Polybar'"
];

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.3;

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

opacity-rule = [
    "88:class_g = 'Code'",
    "88:class_g = 'code-oss'"
];

blur-background-exclude = [
  "class_g = 'Brave-browser'"
];

fade-exclude = [
  "class_g = 'Brave-browser'"
];
