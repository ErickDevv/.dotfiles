[colors]
background = #11111b
background-alt = #1e1e2e
foreground = #cdd6f4
primary = #89b4fa
secondary = #f38ba8
alert = #f38ba8
green = #a6e3a1
yellow = #f9e2af
cyan = #94e2d5

[bar/main]
width = 100%
height = 30
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 2

border-size = 0

padding-left = 2
padding-right = 2

module-margin = 2

font-0 = "JetBrainsMono Nerd Font:size=10;2"
font-1 = "Font Awesome 6 Free:size=10;2"

modules-left = bspwm
modules-center = date
modules-right = launcher-vscode launcher-kitty launcher-thunar launcher-screenshot sep cpu memory temperature pulseaudio network

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/bspwm]
type = internal/bspwm

label-focused = â—Ź
label-focused-foreground = ${colors.primary}
label-focused-padding = 1

label-occupied = â—Ź
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-empty = â—‹
label-empty-foreground = #444455
label-empty-padding = 1

[module/sep]
type = custom/text
format = <label>
label = |
label-foreground = #444455
format-padding = 1

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-padding = 0
label = ď‹› %percentage%%

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-padding = 0
label = îż… %percentage_used%%

[module/temperature]
type = internal/temperature
interval = 2
warn-temperature = 75

format = <label>
format-padding = 0
format-warn = <label-warn>
format-warn-padding = 0

label = ď‹‰ %temperature-c%
label-warn = ď‹‡ %temperature-c%
label-warn-foreground = ${colors.alert}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <label-volume>
label-volume = ď€¨ %percentage%%

label-muted = ď‘¦ muted

click-right = pavucontrol
click-left = pamixer -t

scroll-up = pamixer -i 5
scroll-down = pamixer -d 5

[module/network]
type = internal/network
interface-type = wireless

interval = 3

format-connected = <label-connected>
label-connected = ď‡« %essid%

format-disconnected = <label-disconnected>
label-disconnected = ó°–Ş offline

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d

label = ó°Ą” %date%

[module/launcher-vscode]
type = custom/text
format = <label>
label = ó°¨ž
label-foreground = ${colors.primary}
format-padding = 1
click-left = code &

[module/launcher-kitty]
type = custom/text
format = <label>
label = ó°„›
label-foreground = ${colors.cyan}
format-padding = 1
click-left = kitty &

[module/launcher-thunar]
type = custom/text
format = <label>
label = ó°‰‹
label-foreground = ${colors.yellow}
format-padding = 1
click-left = thunar &

[module/launcher-screenshot]
type = custom/text
format = <label>
label = ó°ą‘
label-foreground = ${colors.green}
format-padding = 1
click-left = xfce4-screenshooter &
